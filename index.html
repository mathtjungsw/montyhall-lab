<script>
const ko={choose:"\uCC98\uC74C \uACE0\uB97C \uBB38\uC744 \uC120\uD0DD\uD558\uC138\uC694",hidden:"\uC790\uB3D9\uCC28\uB294 \uC138 \uBB38 \uC911 \uD558\uB098 \uB4A4\uC5D0 \uBB34\uC791\uC704\uB85C \uC228\uC5B4 \uC788\uC2B5\uB2C8\uB2E4.",none:"\uC544\uC9C1 \uBB38\uC744 \uACE0\uB974\uC9C0 \uC54A\uC558\uC2B5\uB2C8\uB2E4.",stay:"\uADF8\uB300\uB85C",sw:"\uBC14\uAFB8\uAE30",win:"\uC2B9\uB9AC",lose:"\uC2E4\uD328",goat:"\uC5FC\uC18C",car:"\uC790\uB3D9\uCC28",selected:"\uB0B4 \uC120\uD0DD",final:"\uCD5C\uC885 \uC120\uD0DD"};
const $=s=>document.querySelector(s), doorsEl=$("#doors"), stayBtn=$("#stayBtn"), switchBtn=$("#switchBtn"), resetBtn=$("#resetBtn"), statusTitle=$("#statusTitle"), statusText=$("#statusText"), roundSummary=$("#roundSummary"), historyList=$("#historyList"), playsEl=$("#plays"), stayRateEl=$("#stayRate"), switchRateEl=$("#switchRate"), trialRange=$("#trialRange"), trialValue=$("#trialValue"), runSim=$("#runSim"), simStayText=$("#simStayText"), simSwitchText=$("#simSwitchText"), simStayBar=$("#simStayBar"), simSwitchBar=$("#simSwitchBar"), stayRow=$("#stayRow"), switchRow=$("#switchRow"), strategyButtons=[...document.querySelectorAll("[data-strategy]")];
const stats={plays:0,stayWins:0,stayPlays:0,switchWins:0,switchPlays:0,history:[]};let strategy="both",game;
function randomDoor(){return Math.floor(Math.random()*3)}
function newGame(){game={car:randomDoor(),chosen:null,opened:null,final:null,phase:"choose",result:null};stayBtn.disabled=true;switchBtn.disabled=true;statusTitle.textContent=ko.choose;statusText.textContent=ko.hidden;roundSummary.textContent=ko.none;renderDoors()}

function chooseDoor(i){if(game.phase!=="choose")return;game.chosen=i;game.opened=hostOpenDoor(i);game.phase="decide";stayBtn.disabled=false;switchBtn.disabled=false;statusTitle.textContent=`${i+1}\uBC88 \uBB38\uC744 \uACE8\uB790\uC2B5\uB2C8\uB2E4`;statusText.textContent=`\uC0AC\uD68C\uC790\uAC00 ${game.opened+1}\uBC88 \uBB38\uC744 \uC5F4\uC5C8\uC2B5\uB2C8\uB2E4. \uC774\uC81C \uADF8\uB300\uB85C \uAC08\uC9C0 \uBC14\uAFC0\uC9C0 \uC815\uD558\uC138\uC694.`;roundSummary.textContent=`\uCCAB \uC120\uD0DD\uC740 ${i+1}\uBC88 \uBB38\uC785\uB2C8\uB2E4. \uC5F4\uB9B0 \uBB38\uC5D0\uB294 \uC5FC\uC18C\uAC00 \uC788\uC5C8\uC2B5\uB2C8\uB2E4.`;renderDoors()}
function finishRound(shouldSwitch){if(game.phase!=="decide")return;const rem=[0,1,2].find(d=>d!==game.chosen&&d!==game.opened);game.final=shouldSwitch?rem:game.chosen;game.result=game.final===game.car;game.phase="done";const name=shouldSwitch?ko.sw:ko.stay;stats.plays++;if(shouldSwitch){stats.switchPlays++;if(game.result)stats.switchWins++}else{stats.stayPlays++;if(game.result)stats.stayWins++}stats.history.unshift({strategy:name,won:game.result,final:game.final+1,car:game.car+1});stats.history=stats.history.slice(0,8);stayBtn.disabled=true;switchBtn.disabled=true;statusTitle.textContent=game.result?"\uC790\uB3D9\uCC28\uB97C \uCC3E\uC558\uC2B5\uB2C8\uB2E4":"\uC774\uBC88\uC5D0\uB294 \uC5FC\uC18C\uC600\uC2B5\uB2C8\uB2E4";statusText.textContent=`\uCD5C\uC885 \uC120\uD0DD\uC740 ${game.final+1}\uBC88 \uBB38, \uC790\uB3D9\uCC28\uB294 ${game.car+1}\uBC88 \uBB38 \uB4A4\uC5D0 \uC788\uC5C8\uC2B5\uB2C8\uB2E4.`;roundSummary.textContent=`${name} \uC804\uB7B5\uC73C\uB85C ${game.result?ko.win:ko.lose}\uD588\uC2B5\uB2C8\uB2E4. \uB2E4\uC74C \uD310\uC5D0\uC11C \uAE30\uB85D\uC744 \uB354 \uC313\uC544\uBCF4\uC138\uC694.`;renderDoors();renderStats()}

function pct(w,p){return p?Math.round(w/p*100):0}function renderStats(){playsEl.textContent=stats.plays;stayRateEl.textContent=`${pct(stats.stayWins,stats.stayPlays)}%`;switchRateEl.textContent=`${pct(stats.switchWins,stats.switchPlays)}%`;historyList.innerHTML=stats.history.length?stats.history.map(x=>`<div class="history-item"><span><strong>${x.strategy}</strong> ${x.won?ko.win:ko.lose}</span><span>\uC120\uD0DD ${x.final}, \uC790\uB3D9\uCC28 ${x.car}</span></div>`).join(""):`<div class="history-item"><span>\uC544\uC9C1 \uAE30\uB85D\uC774 \uC5C6\uC2B5\uB2C8\uB2E4</span><span>\uCCAB \uD310\uC744 \uC2DC\uC791\uD574\uBCF4\uC138\uC694</span></div>`}

stayBtn.addEventListener("click",()=>finishRound(false));switchBtn.addEventListener("click",()=>finishRound(true));resetBtn.addEventListener("click",newGame);runSim.addEventListener("click",runSimulation);trialRange.addEventListener("input",()=>{trialValue.textContent=Number(trialRange.value).toLocaleString("ko-KR")});strategyButtons.forEach(b=>b.addEventListener("click",()=>{strategy=b.dataset.strategy;strategyButtons.forEach(x=>x.classList.toggle("active",x===b))}));newGame();renderStats();runSimulation();
